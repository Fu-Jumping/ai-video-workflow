  <text class="small" x="90" y="246">先看大字理解流程；需要开发时再看小字落位。每次上游修改都触发影响分析和一致性同步。</text>

  <rect class="panel" x="60" y="285" width="300" height="760" rx="18" />
  <text class="section-title" x="90" y="325">官方规则包与工具层</text>
  <rect class="node" x="90" y="352" width="240" height="72" rx="12" />
  <text class="step-title" x="110" y="380">官方 AI 视频规则包</text>
  <text class="small" x="110" y="405">可复用创作规则包</text>
  <rect class="node" x="90" y="452" width="240" height="84" rx="12" />
  <text class="label" x="110" y="480">审核标准与失败类型</text>
  <text class="small" x="110" y="505">每步怎么判断合格</text>
  <rect class="node" x="90" y="564" width="240" height="88" rx="12" />
  <text class="label" x="110" y="592">AI 助手执行能力</text>
  <text class="small" x="110" y="617">长文规则 + 技能入口</text>
  <text class="small" x="110" y="637">让 IDE 知道怎么做</text>
  <rect class="node" x="90" y="680" width="240" height="84" rx="12" />
  <text class="label" x="110" y="708">每步交付模板</text>
  <text class="small" x="110" y="733">规定要交什么格式</text>
  <rect class="node" x="90" y="792" width="240" height="92" rx="12" />
  <text class="label" x="110" y="820">命令行工具</text>
  <text class="small" x="110" y="845">初始化 / 同步 / 校验</text>
  <text class="small" x="110" y="865">诊断 / 新包脚手架</text>
  <rect class="gate" x="90" y="912" width="240" height="96" rx="12" />
  <text class="label" x="110" y="940">自动检查规则</text>
  <text class="small" x="110" y="965">提示词结构不跑偏</text>
  <text class="small" x="110" y="985">链接和镜像不漂移</text>

  <rect class="panel" x="1560" y="285" width="300" height="760" rx="18" />
  <text class="section-title" x="1590" y="325">AI IDE 运行入口</text>
  <rect class="node" x="1590" y="352" width="240" height="94" rx="12" />
  <text class="label" x="1610" y="380">Codex 运行入口</text>
  <text class="small" x="1610" y="405">AI 可读取的技能目录</text>
  <text class="small" x="1610" y="425">完整工作流镜像</text>
