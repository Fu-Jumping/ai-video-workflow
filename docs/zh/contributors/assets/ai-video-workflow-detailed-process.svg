  <text class="label" x="1610" y="506">Cursor</text>
  <text class="small" x="1610" y="531">同步同一套技能规则</text>
  <rect class="node" x="1590" y="588" width="240" height="78" rx="12" />
  <text class="label" x="1610" y="616">Claude Code</text>
  <text class="small" x="1610" y="641">同步同一套技能规则</text>
  <rect class="node" x="1590" y="698" width="240" height="78" rx="12" />
  <text class="label" x="1610" y="726">Trae</text>
  <text class="small" x="1610" y="751">同步技能与规则入口</text>
  <rect class="gate" x="1590" y="810" width="240" height="108" rx="12" />
  <text class="label" x="1610" y="838">不同 IDE 同一规则</text>
  <text class="small" x="1610" y="863">母包更新后要同步</text>
  <text class="small" x="1610" y="883">入口不同，规则不变</text>
  <text class="small" x="1610" y="903">引用不能写死本机路径</text>

