  <rect class="bg" x="0" y="0" width="1920" height="1620" />

  <text class="title" x="70" y="68">ai-video-workflow 详细流程图</text>
  <text class="subtitle" x="70" y="102">用户使用路径、官方规则包、六步产物、审核门槛、修改传播与 AI IDE 运行入口的关系</text>

  <rect class="panel" x="60" y="130" width="1800" height="125" rx="18" />
  <text class="section-title" x="90" y="168">用户使用项目过程</text>
  <rect class="chip" x="90" y="188" width="190" height="42" rx="10" />
  <text class="label" x="108" y="214">1. 安装与构建</text>
  <rect class="chip" x="330" y="188" width="220" height="42" rx="10" />
  <text class="label" x="348" y="214">2. init 选择 IDE/平台</text>
  <rect class="chip" x="600" y="188" width="215" height="42" rx="10" />
  <text class="label" x="618" y="214">3. 同步 IDE 规则</text>
  <rect class="chip" x="865" y="188" width="210" height="42" rx="10" />
  <text class="label" x="883" y="214">4. 推进 Step 1-6</text>
  <rect class="chip-orange" x="1125" y="188" width="220" height="42" rx="10" />
  <text class="label" x="1143" y="214">5. 自动校验/诊断</text>
  <rect class="chip-green" x="1395" y="188" width="220" height="42" rx="10" />
  <text class="label" x="1413" y="214">6. 交付 / 协作 / 回流</text>
