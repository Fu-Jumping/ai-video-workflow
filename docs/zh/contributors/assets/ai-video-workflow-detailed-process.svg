<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1620" viewBox="0 0 1920 1620" role="img" aria-labelledby="title desc">
  <title id="title">ai-video-workflow detailed process map</title>
  <desc id="desc">A detailed architecture and workflow map for the ai-video-workflow project, covering user flow, official rule package modules, six production steps, review gates, change propagation, and AI IDE runtime entrypoints.</desc>
  <defs>
